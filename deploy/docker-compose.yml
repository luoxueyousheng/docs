# 服务器端编排：站点容器 + webhook 接收容器。
# 用法（在本 deploy 目录里）：cp .env.example .env，填好 .env，再 docker compose up -d
# 真实密钥放 .env（已在 .gitignore 排除，不要提交）。
services:
  docs:
    image: ${IMAGE_NAME:-yiminger/jadeview_docs:latest}
    container_name: docs-site
    restart: unless-stopped
    ports:
      - "${SITE_PORT:-8088}:80"

  # 文档 MCP 服务（search_docs / get_doc）。容器内监听 8848，映射到 host MCP_PORT。
  # 反代把它挂到你想要的路径/子域即可（TLS 你自己在前置反代终结）。
  mcp:
    image: ${MCP_IMAGE_NAME:-yiminger/jadeview_docs_mcp:latest}
    # 若服务器上有完整仓库、想本地构建：注释掉上面 image，改用下面两行
    # build:
    #   context: ..
    #   dockerfile: mcp/Dockerfile
    container_name: docs-mcp
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8848
      BASE_URL: ${BASE_URL:-https://jade.run}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    ports:
      - "${MCP_PORT:-8848}:8848"

  webhook:
    image: python:3.11-slim
    container_name: docs-webhook
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./webhook-server.py:/app/webhook-server.py:ro
    environment:
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN}
      DOCKERHUB_USER: ${DOCKERHUB_USER}
      DOCKERHUB_TOKEN: ${DOCKERHUB_TOKEN}
      IMAGE_NAME: ${IMAGE_NAME:-yiminger/jadeview_docs:latest}
      CONTAINER_NAME: docs-site
      SITE_PORT: ${SITE_PORT:-8088}
    working_dir: /app
    command: bash -c "pip install --quiet -i https://pypi.tuna.tsinghua.edu.cn/simple fastapi uvicorn docker && python webhook-server.py"
