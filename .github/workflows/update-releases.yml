# 自动刷新「发行版本」数据快照（public/releases/data.json）。
#
# 思路：发行库（JadeViewDocs/JadeView）发新版后，本工作流在 CI（海外、可达 GitHub）拉取 Releases，
#   重新生成同源静态快照并提交回本仓库。用户访问时只读本站 /releases/data.json，国内不卡、不直连 GitHub。
#
# 触发：定时（每日）+ 手动。注意 `on: release` 只对“本仓库自身”的发布生效，而版本发布在另一个库里，
#   故这里用 schedule + 手动；若想“发版即更新”，可在发行库加一步向本仓库发 repository_dispatch
#   （type: refresh-releases），再在下方 on 里打开 repository_dispatch 即可。
name: 刷新发行快照

on:
  schedule:
    - cron: '0 18 * * *' # 每日 02:00（北京时间）
  workflow_dispatch: {}
  # repository_dispatch:
  #   types: [refresh-releases]

permissions:
  contents: write

concurrency:
  group: update-releases
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 脚本仅用 Node 内置模块，无需安装依赖
      - name: 生成发行快照
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-changelog.mjs

      - name: 有变化则提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- public/releases/data.json; then
            echo "发行数据无变化，跳过提交"
          else
            git add public/releases/data.json
            git commit -m "chore(releases): 自动刷新发行快照 [skip ci]"
            git push
          fi
